nginx:
    image: nginx:alpine
    container_name: smart_uploader_nginx
    ports:
      - "8080:80"
    volumes:
      - ./static:/usr/share/nginx/html:ro
      - ./app/images:/images:ro
    # Ось тут магія: записуємо конфіг прямо в контейнер при запуску
    command: /bin/sh -c "printf 'server { \
        listen 80; \
        client_max_body_size 10M; \
        location / { \
            root /usr/share/nginx/html; \
            index index.html; \
            try_files $$uri $$uri.html $$uri/ =404; \
        } \
        location /api/ { \
            proxy_pass http://app:8080; \
        } \
        location /upload { \
            proxy_pass http://app:8080; \
        } \
        location /delete/ { \
            proxy_pass http://app:8080; \
        } \
        location /images/ { \
            alias /images/; \
        } \
    }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - app