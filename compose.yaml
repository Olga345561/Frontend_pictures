services:
  app:
    build: .
    container_name: image-server-app
    volumes:
      - ./app.py:/app/app.py
      - ./static:/app/static
      - ./images:/app/images
      - ./logs:/app/logs
      - ./backups:/app/backups
    environment:
      - IMAGES_DIR=/app/images
      - LOGS_DIR=/app/logs
      - STATIC_DIR=/app/static
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=images_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: image-server-nginx
    ports:
      - "8080:80"
    volumes:
      - ./static:/usr/share/nginx/html:ro
      - ./images:/images:ro
    command: >
      /bin/sh -c "printf 'server {
      listen 80;
      client_max_body_size 10M;
      location / {
          root /usr/share/nginx/html;
          index index.html;
          try_files $$uri $$uri.html $$uri/ =404;
      }
      
      location /images-list {
                proxy_pass http://app:8080;
            }
            location /api/ {
                proxy_pass http://app:8080;
            }
            location /upload {
                proxy_pass http://app:8080;
            }
            location /delete/ {
                proxy_pass http://app:8080;
            }
            location /images/ {
                alias /images/;
            }
            }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: postgres:17
    container_name: image-server-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=images_db
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: image-server-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:

